# Starship configuration

# Raise command timeout from 500ms default to avoid Python/Go version check warnings
command_timeout = 2000

# Inserts a blank line between shell prompts
add_newline = true

# Set the format of the prompt
format = """$os$username$directory$git_branch$git_status$nodejs$golang$julia$python$ruby$rust\
$line_break$character"""

# Right Prompt Configuration
right_format = """$cmd_duration$shell$battery$time"""

[os]
format = "[$symbol]($style) "
style = "fg:#26C6DA"
disabled = false

[os.symbols]
Windows = "оҳӘ"
Ubuntu = "оң’"
SUSE = "SUSE"
Raspbian = "пҢ•"
Mint = "пҢҺ"
Macos = "оң‘"
Manjaro = "пҢ’"
Linux = "пҢҡ"
Gentoo = "пҢҚ"
Fedora = "пҢҠ"
Debian = "оқҪ"
CentOS = "пҢ„"
Arch = "пҢғ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "п…»"

[username]
style_user = "fg:#1951c9"
style_root = "fg:#ffff66"
format = "[$user]($style) "
disabled = false
show_always = true

[directory]
style = "fg:#20b664"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "вҖҰ/"
# Show the path from cwd, not from the git-repo root, so sibling checkouts of
# the same repo name (e.g. ~/dev/dotfiles vs /tmp/jacks-dot/.dotfiles) are
# distinguishable in the prompt. With truncation_length=3 this gives:
#   ~/dev/dotfiles               вҶ’ ~/dev/dotfiles
#   /tmp/jacks-dot/.dotfiles     вҶ’ вҖҰ/tmp/jacks-dot/.dotfiles
#   ~/dev/some/deep/nested/path  вҶ’ вҖҰ/some/deep/nested/path
truncate_to_repo = false

[git_branch]
symbol = "оӮ "
style = "fg:#fffb38"
format = "[$symbol $branch]($style) "

[git_status]
style = "fg:#fffb38"
format = '([$all_status$ahead_behind]($style)) '
conflicted = "=${count}"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = "пЈ–${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "вңҳ${count}"

[character]
success_symbol = "[у°„ҫ](bold green)"
error_symbol = "[у°„ҫ](bold red)"
vicmd_symbol = "[вқ®](bold green)"

[nodejs]
format = "[оңҳ $version](fg:#6CA35E) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[golang]
format = "[оҳ§ $version](fg:#8ED1F7) "

[julia]
format = "[оҳӨ $version](fg:#4063D8) "

[python]
format = "[оҳҶ $version](fg:#FFDE57) "
pyenv_version_name = true

[ruby]
format = "[оң№ $version](fg:#AE1401) "

[rust]
format = "[оһЁ $version](fg:#CE412B) "

#[aws]
#symbol = "оһҳ"
#format = '[$symbol ($profile@$region)]($style) '
#style = "fg:#FFA400"
#
#[azure]
#disabled = false
#format = "[пҙғ $subscription]($style) "
#style = "blue"

[cmd_duration]
min_time = 1000
format = "[$duration]($style) "
style = "fg:#83769c"
show_milliseconds = true

[shell]
format = "[$indicator]($style) "
zsh_indicator = "zsh"
powershell_indicator = "pwsh"
bash_indicator = "bash"
disabled = false
style = "fg:#0077c2"

[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "вҡЎпёҸ"
discharging_symbol = "рҹ’Җ"

[[battery.display]]
threshold = 10
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

[time]
disabled = false
format = "[$time]($style) "
style = "fg:#2e9599"
use_12hr = false

